name: Multi-platform Build & Testing

on:
  push:
    branches: [main, test-workflow]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg pkg-config libeigen3-dev libavformat-dev libavcodec-dev libavutil-dev libswscale-dev

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install eigen ffmpeg

      - name: Cache dependencies (Windows - vcpkg)
        if: runner.os == 'Windows'
        id: cache-vckpg
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: ${{ runner.os }}-vcpkg-v2

      - name: Install Dependencies (Windows - vcpkg)
        if: runner.os == 'Windows' && steps.cache-vckpg.outputs.cache-hit != 'true'
        run: vcpkg install eigen3:x64-windows

      - name: Cache dependencies (Windows - FFmpeg)
        id: cache-ffmpeg
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:/ffmpeg
          key: ${{ runner.os }}-FFmpeg-v1

      - name: Install FFmpeg Dev (Windows)
        if: runner.os == 'Windows' && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip
          unzip -q ffmpeg.zip -d C:/ffmpeg_temp
          mv C:/ffmpeg_temp/ffmpeg-master-latest-win64-gpl-shared C:/ffmpeg

      - name: Set FFMPEG_PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "FFMPEG_PATH=C:/ffmpeg" >> $GITHUB_ENV

      - name: Configure
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: cmake --build build --config Release
      
      - name: Run Tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-${{ matrix.os }}
          path: |
            build/OpticalFlowVideoTracking
            build/Release/